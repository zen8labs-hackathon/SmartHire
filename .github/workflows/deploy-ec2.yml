# Auto-deploy EC2 when pushing to production or develop.
#
# Requires a self-hosted GitHub Actions runner on the EC2 box (see docs/ci-cd-ec2.md).
# Develop needs one-time clone at /opt/smarthire/app-develop before the first run.

name: Deploy EC2

on:
  push:
    branches:
      - production
      - develop

concurrency:
  group: deploy-ec2-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ github.ref_name }}
    runs-on: [self-hosted, smarthire-ec2]
    timeout-minutes: 30

    steps:
      - name: Deploy stack
        run: |
          set -euo pipefail
          BRANCH="${{ github.ref_name }}"

          if [ "$BRANCH" = "production" ]; then
            APP_DIR=/opt/smarthire/app
            DEPLOY_SCRIPT=deploy/deploy-bluegreen.sh
          elif [ "$BRANCH" = "develop" ]; then
            APP_DIR=/opt/smarthire/app-develop
            DEPLOY_SCRIPT=deploy/deploy-develop.sh
          else
            echo "Unsupported branch: $BRANCH"
            exit 1
          fi

          if [ ! -d "$APP_DIR/.git" ]; then
            echo "Missing checkout at $APP_DIR"
            echo "One-time: clone repo there and checkout $BRANCH (see docs/ci-cd-ec2.md)"
            exit 1
          fi

          cd "$APP_DIR"
          git config --global --add safe.directory "$APP_DIR"
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"
          git reset --hard "origin/$BRANCH"

          chmod +x "$DEPLOY_SCRIPT" 2>/dev/null || true
          if [ -x "$DEPLOY_SCRIPT" ]; then
            "./$DEPLOY_SCRIPT" "$BRANCH"
          else
            echo "Deploy script not executable: $APP_DIR/$DEPLOY_SCRIPT"
            ls -la deploy/ || true
            exit 1
          fi
