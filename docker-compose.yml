version: "3.8"

services:
  app:
    build: .
    image: smart_hire:latest
    container_name: smarthire_app
    ports:
      - "3100:3100"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      floci:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: smart_hire
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d smart_hire"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # --- HỆ THỐNG GIẢ LẬP AWS S3 (FLOCI) ---
  floci:
    image: floci/floci:latest
    container_name: floci_local
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    environment:
      - DEBUG=1
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "${TMPDIR:-/tmp}/floci:/tmp/floci"
      # Ánh xạ thư mục chứa script khởi tạo (init-s3.sh) vào bên trong container
      - "./.floci-init:/etc/floci/init.d"

volumes:
  pgdata:
