# Smart Hire develop — nginx site (same EC2 as production)
# Domain: smart-hire-dev.zen8labs.io → app on 127.0.0.1:3200
# MinIO: /smart-hire-dev-bucket/... → 127.0.0.1:9010
#
# Install AFTER DNS A record exists (or certbot will fail):
#   sudo cp /opt/smarthire/app-develop/deploy/nginx/smart-hire-dev.zen8labs.io.conf \
#     /etc/nginx/sites-available/smart-hire-dev.zen8labs.io
#   sudo ln -sf /etc/nginx/sites-available/smart-hire-dev.zen8labs.io \
#     /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d smart-hire-dev.zen8labs.io
#
# Until DNS: skip this file; test app via SSM port-forward to :3200

upstream smarthire_dev_app {
    server 127.0.0.1:3200;
    keepalive 32;
}

upstream smarthire_dev_minio {
    server 127.0.0.1:9010;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name smart-hire-dev.zen8labs.io;

    client_max_body_size 50m;

    include /opt/smarthire/app-develop/deploy/nginx/snippets/minio-proxy-dev.conf;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_pass http://smarthire_dev_app;
    }
}
