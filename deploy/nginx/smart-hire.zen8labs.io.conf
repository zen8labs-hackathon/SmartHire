# Smart Hire — nginx site for EC2
# Domain: smart-hire.zen8labs.io → app on 127.0.0.1:3100
# MinIO path-style: /smart-hire-bucket/... → 127.0.0.1:9000 (must match S3_BUCKET)
#
# Install (as root on the server):
#   sudo cp deploy/nginx/smart-hire.zen8labs.io.conf /etc/nginx/sites-available/smart-hire.zen8labs.io
#   sudo ln -sf /etc/nginx/sites-available/smart-hire.zen8labs.io /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d smart-hire.zen8labs.io
#
# If certbot already rewrote this file, copy the `location /minio/` block into
# BOTH the :80 and :443 server blocks, then: sudo nginx -t && sudo systemctl reload nginx

upstream smarthire_app {
    server 127.0.0.1:3100;
    keepalive 32;
}

upstream smarthire_minio {
    server 127.0.0.1:9000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name smart-hire.zen8labs.io;

    # Browser PUTs to MinIO can be large (CV/JD PDFs).
    client_max_body_size 50m;

    # S3-compatible API — see deploy/nginx/snippets/minio-proxy.conf
    include /opt/smarthire/app/deploy/nginx/snippets/minio-proxy.conf;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_pass http://smarthire_app;
    }
}
