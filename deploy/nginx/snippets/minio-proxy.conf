# Path-style MinIO/S3 on the same domain (no /minio/ prefix).
# Presigned URLs look like: https://smart-hire.zen8labs.io/smart-hire-bucket/jd/file.pdf
#
# IMPORTANT: the path segment must match S3_BUCKET in .env (default: smart-hire-bucket).
# Include inside BOTH listen 80 and listen 443 ssl server blocks, BEFORE location /:
#   include /opt/smarthire/app/deploy/nginx/snippets/minio-proxy.conf;

location ^~ /smart-hire-bucket/ {
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_connect_timeout 300;
    proxy_send_timeout 300;
    proxy_read_timeout 300;
    proxy_request_buffering off;
    proxy_pass http://127.0.0.1:9000/smart-hire-bucket/;
}
