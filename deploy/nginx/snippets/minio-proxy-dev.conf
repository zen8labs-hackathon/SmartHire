# Path-style MinIO for develop (bucket smart-hire-dev-bucket → MinIO :9010).
# Include inside BOTH listen 80 and listen 443 ssl server blocks, BEFORE location /:
#   include /opt/smarthire/app-develop/deploy/nginx/snippets/minio-proxy-dev.conf;

location ^~ /smart-hire-dev-bucket/ {
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_connect_timeout 300;
    proxy_send_timeout 300;
    proxy_read_timeout 300;
    proxy_request_buffering off;
    proxy_pass http://127.0.0.1:9010/smart-hire-dev-bucket/;
}
